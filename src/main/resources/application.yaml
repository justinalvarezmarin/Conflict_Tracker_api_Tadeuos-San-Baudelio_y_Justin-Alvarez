spring:
  application:
    name: Conflict_Tracker_api_Tadeuos-San-Baudelio_y_Justin-Alvarez

  # Quitamos el 'active: dev' fijo para que Railway pueda mandar su propio perfil
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  datasource:
    # Si DB_URL no existe, fallará rápido en lugar de conectar a localhost
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Dialecto específico para PostgreSQL (importante para Supabase)
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Esto evita problemas de conexión lenta en el arranque
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  main:
    allow-bean-definition-overriding: true

server:
  # Railway inyecta el puerto automáticamente en la variable PORT
  port: ${PORT:8080}