spring:
  config:
    activate:
      on-profile: production
  datasource:
    # Aquí es donde añadimos manualmente los protocolos para que la URL sea válida
    url: jdbc:postgresql://${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        # Esto soluciona el aviso 'HHH90000021' de tu log
        boot:
          allow_jdbc_metadata_access: false
        # Esto soluciona el aviso 'HHH90000025' de tu log (limpia el dialecto)
        # dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}