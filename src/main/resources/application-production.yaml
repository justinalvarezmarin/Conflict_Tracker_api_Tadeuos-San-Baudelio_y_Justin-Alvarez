spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: jdbc:postgresql://${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      # Añadimos un pequeño retraso para permitir que la red se estabilice
      initialization-fail-timeout: 0
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        # Crucial: evita que Hibernate intente "adivinar" cosas de la DB por red
        temp:
          use_jdbc_metadata_defaults: false
        boot:
          allow_jdbc_metadata_access: false
        # Forzamos el dialecto para que no tenga que preguntar a la red cuál usar
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}