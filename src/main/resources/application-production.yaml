spring:
  config:
    activate:
      on-profile: production
  datasource:
    # IMPORTANTE: Asegúrate de que tu variable DB_URL en Railway
    # NO empiece por "jdbc:postgresql://", solo el host.
    url: jdbc:postgresql://${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Estas líneas evitan que Spring intente conectar antes de tiempo
        temp:
          use_jdbc_metadata_defaults: false
        boot:
          allow_jdbc_metadata_access: false
        # Compatibilidad específica para el pooler de Supabase
        jdbc:
          lob:
            non_contextual_creation: true

server:
  port: ${PORT:8080}